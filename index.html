<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2e2e3e;
  --accent:#e8a0bf;--accent2:#a0c4e8;--accent3:#a0e8b8;
  --text:#f0f0f8;--text2:#8888aa;
  --high:#ff6b8a;--mid:#ffd166;--low:#6bcfff;--done:#3a3a55;
  --green:#40916c;--green-l:rgba(64,145,108,.15);--green-b:rgba(64,145,108,.5);
  --mono:'Roboto Mono','ui-monospace','Menlo','Consolas',monospace;
  --radius:12px;--tab-h:56px;--hdr-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}
svg{display:block;flex-shrink:0}
.hdr{height:var(--hdr-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.hdr-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.05em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:11px;color:var(--text2)}
.ibtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.ibtn:active{background:var(--border)}
.ibtn-accent{background:var(--accent);border-color:var(--accent)}
.tabs{height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text2);font-size:10px;position:relative}
.tab.active{color:var(--accent)}
.tab.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.content{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
#pg-map{background:var(--bg);overflow:hidden;display:none;flex-direction:column}
#pg-map.active{display:flex}
.pin-banner{display:none;padding:10px 14px;background:var(--green);color:#fff;font-size:12px;font-weight:700;align-items:center;gap:8px;flex-shrink:0}
.pin-banner.on{display:flex}
.pin-cancel{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.4);background:rgba(0,0,0,.2);color:#fff;font-size:11px;cursor:pointer;font-family:inherit}
.map-cont{flex:1;overflow:hidden;position:relative;touch-action:none}
.map-inner{position:absolute;transform-origin:0 0;cursor:grab;user-select:none}
.map-inner:active{cursor:grabbing}
.map-inner.pinning{cursor:crosshair}
#map-canvas{display:block}
.map-legend{display:flex;gap:10px;padding:6px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:50%}
.unplaced{font-size:10px;background:var(--green);color:#fff;border-radius:10px;padding:1px 7px;font-weight:700;margin-left:auto}
.map-popup{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;min-width:180px;max-width:240px;z-index:60;box-shadow:0 4px 20px rgba(0,0,0,.7)}
.pu-author{font-size:13px;font-weight:700;margin-bottom:2px;padding-right:18px}
.pu-num{font-size:10px;color:var(--text2);margin-bottom:4px}
.pu-items{margin-bottom:6px}
.pu-item-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.pu-actions{display:flex;gap:5px}
.pu-btn{flex:1;padding:7px 4px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.pu-done{background:var(--accent3);color:#000}
.pu-done.undone{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.pu-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.pu-edit.sold{background:#2a3a5a;color:#90b0e8;border-color:#2a3a5a}
.pu-pin{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.pu-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer}
.list-sticky{position:sticky;top:0;z-index:5;background:var(--surface);border-bottom:1px solid var(--border)}
.search-box{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.search-box:focus{border-color:var(--accent)}
.filter-row{display:flex;gap:6px;padding:6px 12px 8px;overflow-x:auto}
.filter-row::-webkit-scrollbar{display:none}
.chip{padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;display:inline-flex;align-items:center;gap:5px;border:1.5px solid;transition:all .15s}
.chip.all{border-color:var(--border);color:var(--text2);background:transparent}
.chip.all.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.chip.hi{border-color:var(--high);color:var(--high);background:transparent}
.chip.hi.on{background:var(--high);color:#000}
.chip.mi{border-color:var(--mid);color:var(--mid);background:transparent}
.chip.mi.on{background:var(--mid);color:#000}
.chip.lo{border-color:var(--low);color:var(--low);background:transparent}
.chip.lo.on{background:var(--low);color:#000}
.chip.dn{border-color:var(--done);color:var(--text2);background:transparent}
.chip.dn.on{background:var(--done);color:var(--text2)}
.stats{display:flex;gap:12px;padding:7px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text2)}
.stat-val{font-family:var(--mono);color:var(--text);font-size:12px;margin-left:3px}
.booth-list{padding:8px}
.sw-wrap{position:relative;margin-bottom:8px;border-radius:var(--radius);overflow:hidden;isolation:isolate}
.sw-bg{position:absolute;right:0;top:0;bottom:0;width:88px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;border-radius:0 var(--radius) var(--radius) 0}
.sw-bg.undo{background:var(--done)}
.booth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;transform:translateX(0);will-change:transform;transition:border-radius .2s ease}
.booth-card.swiped{border-radius:var(--radius) 0 0 var(--radius)}
.booth-card.snap{transition:transform .2s ease,border-radius .2s ease}
.card-hdr{padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.pbar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:36px}
.pbar.h{background:var(--high)}.pbar.m{background:var(--mid)}.pbar.l{background:var(--low)}.pbar.d{background:var(--done)}.pbar.so{background:#2a3a5a}
.card-info{flex:1;min-width:0}
.card-author{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:10px;color:var(--text2);margin-top:3px;display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.mchip{display:inline-flex;align-items:center;gap:2px;border-radius:4px;padding:1px 5px;font-size:10px;white-space:nowrap}
.mchip-pin{color:var(--mid);border:1px solid rgba(255,209,102,.35);background:rgba(255,209,102,.07)}
.card-total{font-family:var(--mono);font-size:12px;color:var(--accent2);flex-shrink:0}
.card-detail{display:none;border-top:1px solid var(--border);padding:10px 12px;background:var(--surface2)}
.card-detail.open{display:block}
.di-item{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(46,46,62,.5)}
.di-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.di-name-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.di-name{font-size:12px;font-weight:500;color:var(--text)}
.di-price{font-family:var(--mono);font-size:11px;color:var(--accent2)}
.di-buyers{display:flex;flex-direction:column;gap:2px;padding-left:8px}
.di-buyer-row{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.di-bname{display:flex;align-items:center;gap:4px}
.di-bname.self{color:var(--accent3)}
.di-bname.friend{color:var(--accent)}
.di-bqty{font-family:var(--mono);font-size:11px;color:var(--text2)}
.drow{display:flex;gap:8px;margin-bottom:5px;font-size:12px;align-items:flex-start}
.dlbl{color:var(--text2);width:40px;flex-shrink:0;font-size:11px;padding-top:1px}
.dacts{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.dact-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.dact-btn:active{background:var(--surface2)}
.bsm{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.bsm:active{background:var(--border)}
.bsm-full{width:100%;justify-content:center;padding:11px}
.proxy-pg{padding:12px}
.px-sec{margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.px-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.px-name{font-size:14px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px}
.px-name.self{color:var(--accent3)}
.px-total{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent2);display:flex;align-items:center;gap:5px}
.px-body{border-top:1px solid var(--border)}
.px-body.collapsed{display:none}
.px-row{padding:8px 14px;border-bottom:1px solid rgba(46,46,62,.4);display:flex;flex-direction:column;gap:2px}
.px-row:last-child{border-bottom:none}
.px-row-author{font-size:12px;font-weight:700}
.px-row-item{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);padding-left:8px}
.drw-ov{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:none;pointer-events:none;transition:background .28s}
.drw-ov.open{display:block;pointer-events:auto}
.drw-ov.vis{background:rgba(0,0,0,.55)}
.drw{position:fixed;top:0;left:0;bottom:0;width:78vw;max-width:300px;background:var(--surface);border-right:1px solid var(--border);z-index:201;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drw.open{transform:translateX(0)}
.drw-hdr{padding:20px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.drw-app{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.1em;margin-bottom:2px}
.drw-sub{font-size:11px;color:var(--text2)}
.drw-body{flex:1;overflow-y:auto;padding:6px 0}
.drw-item{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px}
.drw-item:active{background:var(--surface2)}
.drw-item.cur{color:var(--accent);font-weight:700}
.drw-lbl{padding:10px 16px 4px;font-size:10px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase}
.drw-div{height:1px;background:var(--border);margin:4px 0}
.drw-foot{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.drw-fbtn{width:100%;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:flex-end;justify-content:center}
.mov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding:16px;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.mtitle{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--accent)}
.fg{margin-bottom:12px}
.flbl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block}
.finp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.finp:focus{border-color:var(--accent)}
.frow{display:flex;gap:8px}
.frow .fg{flex:1}
.psel{display:flex;gap:6px}
.popt{flex:1;padding:7px 4px;border-radius:8px;font-size:12px;cursor:pointer;text-align:center;font-family:inherit;border:1.5px solid;transition:all .15s}
.popt[data-p="high"]{border-color:var(--high);color:var(--high);background:transparent}
.popt[data-p="mid"]{border-color:var(--mid);color:var(--mid);background:transparent}
.popt[data-p="low"]{border-color:var(--low);color:var(--low);background:transparent}
.popt.sh{background:var(--high);color:#000;border-color:var(--high);font-weight:700}
.popt.sm{background:var(--mid);color:#000;border-color:var(--mid);font-weight:700}
.popt.sl{background:var(--low);color:#000;border-color:var(--low);font-weight:700}
.ied{background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:8px}
.ied-title{font-size:11px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.ied-rm{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;line-height:1}
.prw{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surface);border-radius:6px;margin-bottom:4px}
.prw-name{font-size:12px;color:var(--accent);flex:1}
.prw-name.self{color:var(--accent3)}
.cntbtn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.cntnum{font-family:var(--mono);font-size:13px;width:22px;text-align:center}
.prw-del{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:0 2px;margin-left:2px}
.add-item-btn,.add-prx-btn{padding:6px 10px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px;text-align:left}
.btn-pri{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.btn-pri:active{opacity:.8}
.btn-sec{width:100%;padding:10px;border-radius:var(--radius);margin-top:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit}
.btn-danger{width:100%;padding:10px;border-radius:var(--radius);margin-top:6px;border:1px solid var(--high);background:transparent;color:var(--high);font-size:13px;cursor:pointer;font-family:inherit}
.fpick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.fchip{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit}
.fchip:active{background:var(--accent);color:var(--bg)}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;padding:20px 16px;animation:slideUp .22s ease}
.confirm-title{font-size:15px;font-weight:700;margin-bottom:6px}
.confirm-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none}
.confirm-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border)!important}
.confirm-ok{background:var(--high);color:#fff}
#toast{position:fixed;left:12px;right:12px;bottom:72px;background:#1e3a2f;color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;text-align:center;opacity:0;transform:translateY(20px);transition:opacity .3s ease,transform .3s ease;z-index:99999;pointer-events:none;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 -2px 20px rgba(0,0,0,.4);will-change:opacity,transform}
#toast.show{opacity:1;transform:translateY(0);pointer-events:auto}
.toast-undo{background:none;border:none;color:var(--accent3);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;padding:0;flex-shrink:0}
.arc-row{padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:5px}
.empty{text-align:center;padding:48px 24px;color:var(--text2);font-size:13px;line-height:1.8}
.empty-icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <button class="ibtn" onclick="openDrawer()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8888aa" stroke-width="2" stroke-linecap="round">
      <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
    </svg>
  </button>
  <div style="flex:1;min-width:0">
    <div class="hdr-title" id="ev-title">コミケ105｜西2館</div>
    <div class="hdr-sub" id="ev-date">24.12.29</div>
  </div>
  <button class="ibtn ibtn-accent" id="hdr-add" onclick="openAddBooth()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f0f13" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
  <button class="ibtn" id="hdr-toggle-proxy" onclick="toggleAllProxy()" style="display:none" title="全部展開/收合">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8888aa" stroke-width="2" stroke-linecap="round" id="toggle-proxy-icon">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
  <button class="ibtn ibtn-accent" id="hdr-exp" onclick="exportProxy()" style="display:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f0f13" stroke-width="2.5" stroke-linecap="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
  </button>
</div>

<!-- CONTENT -->
<div class="content">
  <!-- MAP PAGE -->
  <div class="page active" id="pg-map">
    <div class="pin-banner" id="pin-banner">
      <span id="pin-txt" style="flex:1">點地圖標記位置</span>
      <button class="pin-cancel" onclick="cancelPin()">取消</button>
    </div>
    <div class="map-cont" id="map-cont">
      <div class="map-inner" id="map-inner"><canvas id="map-canvas"></canvas></div>
    </div>
    <!-- popup outside map-cont so touch events don't conflict -->
    <div class="map-popup" id="map-popup" style="display:none">
      <button class="pu-close" onclick="closePopup()">✕</button>
      <div class="pu-author" id="pu-author"></div>
      <div class="pu-num" id="pu-num"></div>
      <div id="pu-xlink"></div>
      <div class="pu-items" id="pu-items"></div>
      <div id="pu-note" style="font-size:10px;color:var(--text2);margin-bottom:5px"></div>
      <div class="pu-actions">
        <button class="pu-btn pu-done" id="pu-done-btn" onclick="toggleDonePopup()">✅ 完成</button>
        <button class="pu-btn pu-edit" onclick="editPopup()">編輯</button>
        <button class="pu-btn pu-pin" onclick="pinPopup()">移動</button>
      </div>
    </div>
    <div class="map-legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--high)"></div>優先</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--mid)"></div>中</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--low)"></div>低</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--done)"></div>已完成</div>
      <span id="unplaced" class="unplaced" style="display:none"></span>
    </div>
  </div>

  <!-- LIST PAGE -->
  <div class="page" id="pg-list">
    <div class="list-sticky">
      <div style="padding:10px 12px">
        <input class="search-box" id="search" placeholder="搜尋作者、書名…" oninput="renderList()">
      </div>
      <div class="filter-row">
        <div class="chip all on" onclick="setFilter('all',this)">全部</div>
        <div class="chip hi" onclick="setFilter('high',this)">優先</div>
        <div class="chip mi" onclick="setFilter('mid',this)">中</div>
        <div class="chip lo" onclick="setFilter('low',this)">低</div>
        <div class="chip dn" onclick="setFilter('done',this)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          已完成
        </div>
      </div>
      <div class="stats">
        <div>目標 <span class="stat-val" id="st-total">0</span></div>
        <div>已完成 <span class="stat-val" id="st-done">0</span></div>
        <div>預算 <span class="stat-val" id="st-budget">¥0</span></div>
      </div>
    </div>
    <div class="booth-list" id="booth-list"></div>
    <div style="height:80px"></div>
  </div>

  <!-- PROXY PAGE -->
  <div class="page" id="pg-proxy">
    <div class="proxy-pg" id="proxy-content"></div>
    <div style="height:80px"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab-map" onclick="switchTab('map',this)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" fill="#e8a0bf" opacity="0.2"/>
      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" stroke="#e8a0bf" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <line x1="9" y1="3" x2="9" y2="18" stroke="#e8a0bf" stroke-width="1.8"/>
      <line x1="15" y1="6" x2="15" y2="21" stroke="#e8a0bf" stroke-width="1.8"/>
    </svg>
    地圖
  </div>
  <div class="tab" id="tab-list" onclick="switchTab('list',this)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <rect x="5" y="3" width="14" height="18" rx="2" fill="#8888aa" opacity="0.15"/>
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" stroke="#8888aa" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="9" y="3" width="6" height="4" rx="1" stroke="#8888aa" stroke-width="1.8" fill="none"/>
      <line x1="9" y1="12" x2="15" y2="12" stroke="#8888aa" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="9" y1="16" x2="13" y2="16" stroke="#8888aa" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    攤位清單
  </div>
  <div class="tab" id="tab-proxy" onclick="switchTab('proxy',this)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" fill="#8888aa" opacity="0.15"/>
      <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="#8888aa" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="3" y1="6" x2="21" y2="6" stroke="#8888aa" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M16 10a4 4 0 0 1-8 0" stroke="#8888aa" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    購買清單
  </div>
</div>

<!-- DRAWER -->
<div class="drw-ov" id="drw-ov" onclick="closeDrawer()"></div>
<div class="drw" id="drw">
  <div class="drw-hdr"><div class="drw-app">跑攤清單</div><div class="drw-sub" id="drw-sub"></div></div>
  <div class="drw-body">
    <div class="drw-lbl">當前活動</div>
    <div class="drw-item cur" onclick="closeDrawer()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e8a0bf" stroke-width="1.8" stroke-linecap="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span id="drw-cur-name"></span>
    </div>
    <div class="drw-div"></div>
    <div class="drw-lbl">歷史活動</div>
    <div id="drw-hist"></div>
  </div>
  <div class="drw-foot">
    <button class="drw-fbtn" onclick="closeDrawer();setTimeout(openNewEvent,250)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增活動
    </button>
    <button class="drw-fbtn" onclick="closeDrawer();setTimeout(openSettings,250)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>當前活動設定
    </button>
    <button class="drw-fbtn" onclick="closeDrawer();setTimeout(openBackup,250)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>備份與還原
    </button>
  </div>
</div>

<!-- BOOTH MODAL -->
<div class="mov" id="mov-booth">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="booth-title">新增攤位</div>
    <div class="frow">
      <div class="fg"><label class="flbl">攤位號</label><input class="finp" id="f-num" placeholder="西2ﾌ63a"></div>
      <div class="fg"><label class="flbl">作者名</label><input class="finp" id="f-author" placeholder="作者名"></div>
    </div>
    <div class="fg"><label class="flbl">X 帳號（選填）</label><input class="finp" id="f-twitter" placeholder="@username"></div>
    <div class="fg">
      <label class="flbl">優先順序</label>
      <div class="psel">
        <div class="popt" data-p="high" onclick="selPri('high')">優先</div>
        <div class="popt" data-p="mid" onclick="selPri('mid')">中</div>
        <div class="popt" data-p="low" onclick="selPri('low')">低</div>

// INDEXEDDB - MAP IMAGE PERSISTENCE
// ═══════════════════
const IDB_NAME='comiket-map';const IDB_STORE='maps';const IDB_KEY='current';
function openIDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e);
  });
}
async function saveMapToDB(blob){
  try{const db=await openIDB();const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(blob,IDB_KEY);}
  catch(e){console.warn('IDB save failed',e);}
}
async function loadMapFromDB(){
  try{
    const db=await openIDB();
    return new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess=e=>resolve(e.target.result||null);
      req.onerror=()=>resolve(null);
    });
  }catch(e){return null;}
}
async function initMapFromDB(){
  const blob=await loadMapFromDB();
  if(!blob)return;
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    const maxW=1800,maxH=2400;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
    canvas.width=w;canvas.height=h;
    canvas.style.width=w+'px';canvas.style.height=h+'px';
    ctx.drawImage(img,0,0,w,h);
    mapImgData=ctx.getImageData(0,0,w,h);
    mapHasImage=true;
    defaultZoom();renderDots();
    document.getElementById('map-status').textContent='✅ 地圖已從上次自動載入';
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

const STORAGE_KEY='comiket-v5';

  try{
    const d=localStorage.getItem(STORAGE_KEY);
    if(!d)return;
    const parsed=JSON.parse(d);
    if(!REQUIRED_FIELDS.every(f=>parsed[f]!=null)){
      console.warn('Saved data missing required fields, using defaults');return;
    }
    parsed.booths=parsed.booths.map(b=>({
      id:b.id||0,num:b.num||'',author:b.author||'',
      twitter:b.twitter||'',priority:b.priority||'mid',

let toastTimer=null,undoFn=null;
function toast(msg,undoCallback){
  const t=document.getElementById('toast');

const IS='#8888aa',AS='#e8a0bf';
function switchTab(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('active');
    t.querySelectorAll('[stroke]').forEach(e=>{if(e.getAttribute('stroke')!=='none')e.setAttribute('stroke',IS);});
    t.querySelectorAll('[fill]:not([fill="none"])').forEach(e=>{const f=e.getAttribute('fill');if(f&&f!=='none'&&f!=='#000')e.setAttribute('fill',IS);});
  });
  document.getElementById('pg-'+name).classList.add('active');
  el.classList.add('active');
  el.querySelectorAll('[stroke]').forEach(e=>{if(e.getAttribute('stroke')!=='none')e.setAttribute('stroke',AS);});
  el.querySelectorAll('[fill]:not([fill="none"])').forEach(e=>{const f=e.getAttribute('fill');if(f&&f!=='none'&&f!=='#000')e.setAttribute('fill',AS);});
  document.getElementById('hdr-add').style.display=name==='proxy'?'none':'flex';
  document.getElementById('hdr-exp').style.display=name==='proxy'?'flex':'none';
  document.getElementById('hdr-toggle-proxy').style.display=name==='proxy'?'flex':'none';
  // render page if dirty
  if(name==='map'){
    if(_dirtyMap){renderDots();_dirtyMap=false;}else{renderDots();}
    // restore map position - clamp with current container size then apply
    requestAnimationFrame(()=>{clamp();applyT();});
  }
  else if(name==='list'&&_dirtyList){renderList();_dirtyList=false;}
  else if(name==='proxy'&&_dirtyProxy){renderProxy();_dirtyProxy=false;}
}

function buildTxt(a){
  let t='【'+a.name+'】完整清單\n'+'─'.repeat(28)+'\n';

  function personSection(name,filterFn,getQty){
    const bought=[],soldOut=[];
    a.booths.forEach(b=>(b.items||[]).forEach(it=>{
      if(!filterFn(it))return;
      if(it.soldOut)soldOut.push({author:b.author,name:it.name,price:it.price||0});
      else{const qty=getQty(it);if(qty>0)bought.push({author:b.author,name:it.name,price:it.price||0,qty});}
    }));
    if(!bought.length&&!soldOut.length)return;
    const label=name===SELF?'個人購買':'代購 — '+name;
    t+='\n▶ '+label+'\n';
    bought.forEach(r=>t+='  '+r.author+'「'+r.name+'」×'+r.qty+' ¥'+(r.price*r.qty).toLocaleString()+'\n');
    t+='  合計：¥'+bought.reduce((s,r)=>s+r.price*r.qty,0).toLocaleString()+'\n';
    if(soldOut.length){
      t+='  ── 完售 ──\n';
      soldOut.forEach(r=>t+='  ✕ '+r.author+'「'+r.name+'」完售\n');
    }
  }

  personSection(SELF,
    it=>(it.proxy||[]).some(p=>p.name===SELF&&(p.qty>0||it.soldOut)),
    it=>{const p=(it.proxy||[]).find(x=>x.name===SELF);return p?p.qty:0;}
  );

  const allF=[...new Set((a.friends||[]).concat(
    a.booths.flatMap(b=>(b.items||[]).flatMap(it=>(it.proxy||[]).map(p=>p.name))).filter(n=>n!==SELF)
  ))];
  allF.forEach(fn=>{
    personSection(fn,
      it=>(it.proxy||[]).some(p=>p.name===fn&&(p.qty>0||it.soldOut)),
      it=>{const p=(it.proxy||[]).find(x=>x.name===fn);return p?p.qty:0;}
    );
  });
  return t;
}

const canvas=document.getElementById('map-canvas');
const ctx=canvas.getContext('2d');
const mapInner=document.getElementById('map-inner');
const mapCont=document.getElementById('map-cont');
let mScale=1,mOffX=0,mOffY=0,mDrag=false,mLastX=0,mLastY=0,mLastDist=0;
let pinId=null,pinPrevX=null,pinPrevY=null,pinTouch=false;
let activePopId=null,mapHasImage=false,mapImgData=null;

function clamp(){
  const cW=mapCont.offsetWidth,cH=mapCont.offsetHeight;
  const mW=canvas.width*mScale,mH=canvas.height*mScale;
  mOffX=mW>cW?Math.min(0,Math.max(mOffX,cW-mW)):(cW-mW)/2;
  mOffY=mH>cH?Math.min(0,Math.max(mOffY,cH-mH)):(cH-mH)/2;
}
function applyT(){mapInner.style.transform='translate('+mOffX+'px,'+mOffY+'px) scale('+mScale+')';}
function defaultZoom(){
  const cW=mapCont.offsetWidth;
  mScale=Math.max(1.8,cW>0?(cW*2)/canvas.width:1.8);
  mOffX=0;mOffY=0;clamp();applyT();
}

function drawDemoMap(){
  if(mapHasImage)return;
  const W=600,H=420;
  canvas.width=W;canvas.height=H;canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.fillStyle='#1a1a28';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#2a2a3a';ctx.lineWidth=1;
  for(let x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.fillStyle='#12121e';ctx.fillRect(0,180,W,60);ctx.fillRect(240,0,80,H);
  [[20,20,200,150],[340,20,240,150],[20,260,200,140],[340,260,240,140]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#252535';ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='#333345';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
  });
  ctx.fillStyle='#4a4a6a';ctx.font='bold 14px monospace';ctx.textAlign='center';
  ctx.fillText('西 2',120,100);ctx.fillText('ﾌ 列',460,100);
  ctx.fillStyle='#333350';ctx.font='11px sans-serif';ctx.fillText('← 通路 →',W/2,216);
  ctx.strokeStyle='#3a3a5a';ctx.lineWidth=2;ctx.strokeRect(1,1,W-2,H-2);
  ctx.fillStyle='#3a3a52';ctx.font='10px monospace';ctx.textAlign='right';
  ctx.fillText('DEMO — 活動設定上傳真實地圖',W-8,H-6);
}

function drawMarkers(){
  // restore map image or demo
  if(mapHasImage&&mapImgData){ctx.putImageData(mapImgData,0,0);}
  else if(!mapHasImage){drawDemoMap();}
  const W=canvas.width,H=canvas.height;
  const bW=Math.round(W/18),bH=Math.round(W/36);
  const maxFS=Math.max(9,Math.round(bH*0.62));
  S.booths.forEach(b=>{
    if(b.x==null)return;
    const cx=b.x/100*W,cy=b.y/100*H;
    const label=b.author.slice(0,4);
    const pri=b.done?'done':b.priority;
    const alpha=b.done?0.78:0.87;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=MCOL[pri]||MCOL.mid;
    ctx.beginPath();ctx.roundRect(cx-bW/2,cy-bH/2,bW,bH,3);ctx.fill();
    ctx.globalAlpha=alpha*0.5;ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1;ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle=b.done?'#fff':(MTXT[pri]||'#000');
    ctx.textAlign='center';ctx.textBaseline='middle';
    let fs=maxFS;ctx.font='bold '+fs+'px "Noto Sans JP",sans-serif';
    while(ctx.measureText(label).width>bW-4&&fs>6){fs--;ctx.font='bold '+fs+'px "Noto Sans JP",sans-serif';}
    ctx.fillText(label,cx,cy);ctx.globalAlpha=1;
  });
}

function renderDots(){
  closePopup();
  drawMarkers();
  const un=S.booths.filter(b=>b.x==null).length;
  const badge=document.getElementById('unplaced');
  badge.style.display=un>0?'':'none';
  if(un>0){badge.textContent=un+' 未打點';badge.style.cursor='pointer';badge.onclick=()=>{
    switchTab('list',document.getElementById('tab-list'));
    // reset search, set filter to show only unplaced
    document.getElementById('search').value='';
    unplacedOnly=true;
    renderList();
  };}else{badge.onclick=null;badge.style.cursor='default';}
}

function hitTest(cX,cY){
  const rect=canvas.getBoundingClientRect();
  const cx=(cX-rect.left)/rect.width*canvas.width;
  const cy=(cY-rect.top)/rect.height*canvas.height;
  const bW=Math.round(canvas.width/18),bH=Math.round(canvas.width/36);
  return [...S.booths].reverse().find(b=>{
    if(b.x==null)return false;
    const bx=b.x/100*canvas.width,by=b.y/100*canvas.height;
    return cx>=bx-bW/2-8&&cx<=bx+bW/2+8&&cy>=by-bH/2-8&&cy<=by+bH/2+8;
  });
}

function drawPinPrev(cX,cY){
  const rect=canvas.getBoundingClientRect();
  pinPrevX=(cX-rect.left)/rect.width;pinPrevY=(cY-rect.top)/rect.height;
  drawMarkers();
  const cx=pinPrevX*canvas.width,cy=pinPrevY*canvas.height;
  const bW=Math.round(canvas.width/18),bH=Math.round(canvas.width/36);
  const b=S.booths.find(x=>x.id===pinId);const label=b?b.author.slice(0,4):'?';
  ctx.globalAlpha=0.92;ctx.fillStyle='#c084fc';
  ctx.beginPath();ctx.roundRect(cx-bW/2,cy-bH/2,bW,bH,3);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2;ctx.stroke();
  ctx.globalAlpha=1;ctx.fillStyle='#000';
  const fs=Math.max(9,Math.round(bH*0.62));
  ctx.font='bold '+fs+'px "Noto Sans JP",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,cx,cy);
}

function confirmPin(){
  if(pinPrevX!=null){
    const b=S.booths.find(b=>b.id===pinId);
    if(b){b.x=parseFloat((pinPrevX*100).toFixed(2));b.y=parseFloat((pinPrevY*100).toFixed(2));save();renderDots();renderList();toast('位置已標記 ✓');}
    pinPrevX=null;pinPrevY=null;
  }
  cancelPin();
}

// touch tracking
let tSX=0,tSY=0,tT=0,tMoved=false;
mapCont.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    mDrag=false;
    mLastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    return;
  }
  tSX=e.touches[0].clientX;tSY=e.touches[0].clientY;tT=Date.now();tMoved=false;
  if(pinId){pinTouch=true;drawPinPrev(e.touches[0].clientX,e.touches[0].clientY);}
  else{mDrag=true;mLastX=e.touches[0].clientX;mLastY=e.touches[0].clientY;}
},{passive:true});

mapCont.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const cr=mapCont.getBoundingClientRect();
    const px=((e.touches[0].clientX+e.touches[1].clientX)/2)-cr.left;
    const py=((e.touches[0].clientY+e.touches[1].clientY)/2)-cr.top;
    const ns=Math.min(5,Math.max(0.3,mScale*(d/mLastDist)));
    mOffX=px-(px-mOffX)*(ns/mScale);mOffY=py-(py-mOffY)*(ns/mScale);
    mScale=ns;mLastDist=d;clamp();applyT();return;
  }
  if(Math.abs(e.touches[0].clientX-tSX)>5||Math.abs(e.touches[0].clientY-tSY)>5)tMoved=true;
  if(pinId&&pinTouch){e.preventDefault();drawPinPrev(e.touches[0].clientX,e.touches[0].clientY);}
  else if(mDrag){mOffX+=e.touches[0].clientX-mLastX;mOffY+=e.touches[0].clientY-mLastY;mLastX=e.touches[0].clientX;mLastY=e.touches[0].clientY;clamp();applyT();}
},{passive:false});

mapCont.addEventListener('touchend',e=>{
  if(pinId&&pinTouch){pinTouch=false;confirmPin();return;}
  mDrag=false;
  if(!tMoved&&Date.now()-tT<300){
    const ex=e.changedTouches[0].clientX,ey=e.changedTouches[0].clientY;
    const hit=hitTest(ex,ey);
    if(hit)showPopup(hit.id,ex,ey);
    else closePopup();
  }
},{passive:true});

mapCont.addEventListener('wheel',e=>{
  e.preventDefault();
  const cr=mapCont.getBoundingClientRect(),px=e.clientX-cr.left,py=e.clientY-cr.top;
  const ns=Math.min(5,Math.max(0.3,mScale*(e.deltaY<0?1.12:.88)));
  mOffX=px-(px-mOffX)*(ns/mScale);mOffY=py-(py-mOffY)*(ns/mScale);
  mScale=ns;clamp();applyT();
},{passive:false});

mapCont.addEventListener('mousedown',e=>{
  if(document.getElementById('map-popup').contains(e.target))return;
  if(pinId){
    const rect=canvas.getBoundingClientRect();
    const x=parseFloat(((e.clientX-rect.left)/rect.width*100).toFixed(2));
    const y=parseFloat(((e.clientY-rect.top)/rect.height*100).toFixed(2));
    const b=S.booths.find(b=>b.id===pinId);
    if(b){b.x=x;b.y=y;save();renderDots();renderList();toast('位置已標記 ✓');}
    cancelPin();return;
  }
  mDrag=true;mLastX=e.clientX;mLastY=e.clientY;
});
document.addEventListener('mousemove',e=>{if(!mDrag)return;mOffX+=e.clientX-mLastX;mOffY+=e.clientY-mLastY;mLastX=e.clientX;mLastY=e.clientY;clamp();applyT();});
document.addEventListener('mouseup',()=>mDrag=false);
mapCont.addEventListener('click',e=>{
  if(pinId||e.target===mapCont||e.target===mapInner||e.target===canvas)return;
});

let curFilter='all',unplacedOnly=false;
function setFilter(f,el){
  curFilter=f;unplacedOnly=false;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderList();
}
function boothTotal(b){return(b.items||[]).reduce((s,it)=>s+(it.price||0)*(it.proxy||[]).reduce((a,p)=>a+p.qty,0),0);}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  if(q)unplacedOnly=false; // typing in search cancels unplaced filter
  let list=[...S.booths];
  if(unplacedOnly){
    list=list.filter(b=>b.x==null);
  } else {
    if(curFilter==='done')list=list.filter(b=>b.done);
    else if(curFilter!=='all')list=list.filter(b=>!b.done&&b.priority===curFilter);
    if(q){
      list=list.filter(b=>
        b.author.toLowerCase().includes(q)||
        (b.items||[]).some(it=>(it.name||'').toLowerCase().includes(q))||
        b.num.toLowerCase().includes(q)||
        (b.twitter||'').toLowerCase().includes(q)
      );
    }
  }
  const ord={high:0,mid:1,low:2};
  if(!unplacedOnly){
    if(curFilter==='all')list.sort((a,b)=>a.done===b.done?(ord[a.priority]||0)-(ord[b.priority]||0):a.done?1:-1);
    else if(curFilter!=='done')list.sort((a,b)=>(ord[a.priority]||0)-(ord[b.priority]||0));
  }
  _updateStats();
  const el=document.getElementById('booth-list');el.innerHTML='';
  // show banner when unplacedOnly is active
  if(unplacedOnly){
    const banner=document.createElement('div');
    banner.style.cssText='display:flex;align-items:center;justify-content:space-between;background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.3);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--mid)';
    banner.innerHTML='<span>📍 顯示未打點攤位</span>';
    const clr=document.createElement('button');
    clr.style.cssText='background:none;border:none;color:var(--mid);font-size:12px;cursor:pointer;font-family:inherit;padding:0';
    clr.textContent='× 清除篩選';
    clr.onclick=()=>{unplacedOnly=false;renderList();};
    banner.appendChild(clr);el.appendChild(banner);
  }
  if(!list.length){
    const es=document.createElement('div');es.className='empty';
    es.innerHTML='\x3cdiv class="empty-icon"\x3e🎪\x3c/div\x3e沒有符合的攤位';
    el.appendChild(es);return;
  }
  list.forEach(b=>el.appendChild(buildCard(b)));
  attachSwipe();
}

function buildCard(b){
  const pri=b.done?'d':b.priority==='high'?'h':b.priority==='mid'?'m':'l';
  const xh=b.twitter?(b.twitter.startsWith('@')?b.twitter:'@'+b.twitter):'';
  const total=boothTotal(b);

  const wrap=document.createElement('div');wrap.className='sw-wrap';wrap.dataset.id=b.id;
  // soldOut bg (further right)

  // done bg (closer, on top of soldOut)
  const bg=document.createElement('div');bg.className='sw-bg'+(b.done?' undo':'');
  bg.textContent=b.done?'取消完成':'已完成';
  bg.onclick=()=>triggerDone(b.id);wrap.appendChild(bg);

  const card=document.createElement('div');card.className='booth-card';card.dataset.id=b.id;

  // header
  const hdr=document.createElement('div');hdr.className='card-hdr';hdr.onclick=()=>toggleDetail(b.id);
  const bar=document.createElement('div');bar.className='pbar '+pri;hdr.appendChild(bar);
  const info=document.createElement('div');info.className='card-info';
  // author line
  const auth=document.createElement('div');auth.className='card-author';auth.textContent=b.author;
  if(xh){const xs=document.createElement('span');xs.style.cssText='font-size:10px;color:var(--accent2);font-weight:400;margin-left:4px';xs.textContent=xh;auth.appendChild(xs);}
  // meta: num · item名 ×qty · item名 ×qty + unplaced
  const meta=document.createElement('div');meta.className='card-meta';
  // booth num
  const numSpan=document.createElement('span');numSpan.style.cssText='color:var(--text2)';numSpan.textContent=b.num;
  meta.appendChild(numSpan);
  // items summary: each item with total qty
  (b.items||[]).forEach(it=>{
    const qty=(it.proxy||[]).reduce((s,p)=>s+p.qty,0);
    if(!it.name&&!qty&&!it.soldOut)return;
    const sep=document.createElement('span');sep.style.cssText='color:var(--border)';sep.textContent='·';
    const chip=document.createElement('span');
    if(it.soldOut){
      chip.className='mchip';chip.style.cssText='color:#888;text-decoration:line-through';
      chip.textContent=(it.name||'—')+' 完售';
    } else {
      chip.className='mchip';
      chip.textContent=(it.name||'—')+(qty?' ×'+qty:'');
    }
    meta.appendChild(sep);meta.appendChild(chip);
  });
  // unplaced indicator

function goToMap(id){

function attachSwipe(){
  document.querySelectorAll('.sw-wrap').forEach(wrap=>{
    const card=wrap.querySelector('.booth-card');
    let sx=0,sy=0,axis=null,moved=false;
    card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;axis=null;moved=false;},{passive:true});
    card.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
      if(!axis)axis=Math.abs(dx)>Math.abs(dy)?'x':'y';
      if(axis==='y')return;e.preventDefault();moved=true;
      card.classList.remove('snap');
      const tx=Math.min(0,Math.max(-88,dx));
      card.style.transform='translateX('+tx+'px)';
      if(tx<-10)card.classList.add('swiped');else card.classList.remove('swiped');
    },{passive:false});
    card.addEventListener('touchend',e=>{
      card.classList.add('snap');
      const dx=e.changedTouches[0].clientX-sx;
      if(moved&&dx<-44){
        card.style.transform='translateX(-88px)';
        card.classList.add('swiped');
      } else {
        card.style.transform='';
        card.classList.remove('swiped');
      }
      setTimeout(()=>card.classList.remove('snap'),200);
    },{passive:true});
  });
}

function renderProxy(){
  const el=document.getElementById('proxy-content');el.innerHTML='';

  // helper: build rows for a person, returns {bought, soldOut}
  function getPersonRows(filterFn){
    const bought=[],soldOut=[];
    S.booths.forEach(b=>{
      const boughtItems=(b.items||[]).filter(it=>!it.soldOut&&filterFn(it));
      const soItems=(b.items||[]).filter(it=>it.soldOut&&filterFn(it));
      if(boughtItems.length)bought.push({author:b.author,items:boughtItems});
      if(soItems.length)soldOut.push({author:b.author,items:soItems});
    });
    return{bought,soldOut};
  }

  function buildPersonSection(personName,isSelf,filterFn,getQty){
    const{bought,soldOut}=getPersonRows(filterFn);
    if(!bought.length&&!soldOut.length)return;
    const total=bought.reduce((s,bg)=>s+bg.items.reduce((ss,it)=>ss+(it.price||0)*getQty(it),0),0);
    const sec=buildProxySec(el);
    const nm=sec.querySelector('.px-name');
    if(isSelf){
      nm.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:inline-block;vertical-align:middle;margin-right:5px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>個人購買';
      nm.classList.add('self');
    } else {
      nm.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:inline-block;vertical-align:middle;margin-right:5px"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>'+esc(personName);
    }
    sec.querySelector('.px-total').innerHTML='¥'+total.toLocaleString()+' <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
    const body=sec.querySelector('.px-body');
    // bought items
    bought.forEach(bg=>{
      const row=document.createElement('div');row.className='px-row';
      const aEl=document.createElement('div');aEl.className='px-row-author';aEl.textContent=bg.author;row.appendChild(aEl);
      bg.items.forEach(it=>{
        const qty=getQty(it);
        const irow=document.createElement('div');irow.className='px-row-item';
        irow.innerHTML='<span>'+esc(it.name||'—')+'</span><span style="color:var(--accent2);font-family:var(--mono)">×'+qty+' ¥'+(qty*(it.price||0)).toLocaleString()+'</span>';
        row.appendChild(irow);
      });
      body.appendChild(row);
    });
    // soldOut divider + items
    if(soldOut.length){
      const div=document.createElement('div');
      div.style.cssText='padding:6px 14px 4px;font-size:11px;color:#666;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px';
      div.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> 完售';
      body.appendChild(div);
      soldOut.forEach(bg=>{
        const row=document.createElement('div');row.className='px-row';row.style.opacity='0.55';
        const aEl=document.createElement('div');aEl.className='px-row-author';aEl.textContent=bg.author;row.appendChild(aEl);
        bg.items.forEach(it=>{
          const irow=document.createElement('div');irow.className='px-row-item';
          const qty2=getQty(it);
          irow.innerHTML='<span style="text-decoration:line-through;color:var(--text2)">'+esc(it.name||'—')+'</span>'
            +'<span style="color:#555;font-family:var(--mono);text-decoration:line-through">'+(qty2?'×'+qty2+' ':'')+'¥'+(it.price||0).toLocaleString()+'</span>';
          row.appendChild(irow);
        });
        body.appendChild(row);
      });
    }
  }

  // personal
  buildPersonSection(SELF,true,
    it=>(it.proxy||[]).some(p=>p.name===SELF&&(p.qty>0||it.soldOut)),
    it=>{const p=(it.proxy||[]).find(x=>x.name===SELF);return p?p.qty:0;}
  );
  // by friend
  const allF=[...new Set([...S.friends,...S.booths.flatMap(b=>(b.items||[]).flatMap(it=>(it.proxy||[]).map(p=>p.name))).filter(n=>n!==SELF)])];
  allF.forEach(fn=>{
    buildPersonSection(fn,false,
      it=>(it.proxy||[]).some(p=>p.name===fn&&(p.qty>0||it.soldOut)),
      it=>{const p=(it.proxy||[]).find(x=>x.name===fn);return p?p.qty:0;}
    );
  });

  if(!el.children.length){
    const es=document.createElement('div');es.className='empty';
    es.innerHTML='\x3cdiv class="empty-icon"\x3e🛍️\x3c/div\x3e還沒有購買項目';
    el.appendChild(es);
  }
}
function buildProxySec(parent){
  const sec=document.createElement('div');sec.className='px-sec';
  const hdr=document.createElement('div');hdr.className='px-hdr';
  const nm=document.createElement('span');nm.className='px-name';
  const tot=document.createElement('span');tot.className='px-total';
  hdr.appendChild(nm);hdr.appendChild(tot);
  const body=document.createElement('div');body.className='px-body';
  hdr.onclick=()=>body.classList.toggle('collapsed');
  sec.appendChild(hdr);sec.appendChild(body);parent.appendChild(sec);
  return sec;
}

    itemRows[curProxyItemIdx].proxy.push({name,qty:1});

function saveBooth(andPin){
  const author=document.getElementById('f-author').value.trim();
  if(!author){alert('請填入作者名');return;}
  const isNew=!editId;
  const booth={
    id:editId||S.nextId++,
    num:document.getElementById('f-num').value.trim(),
    author,twitter:document.getElementById('f-twitter').value.trim(),
    note:document.getElementById('f-note').value.trim(),
    priority:selPriority,done:false,
    items:itemRows.map(it=>({name:it.name,price:it.price,soldOut:!!it.soldOut,proxy:it.proxy.map(p=>({...p}))})),
  };
  if(editId){
    const idx=S.booths.findIndex(x=>x.id===editId);
    if(idx>=0){booth.done=S.booths[idx].done;booth.x=S.booths[idx].x;booth.y=S.booths[idx].y;S.booths[idx]=booth;}
  } else {
    booth.x=null;booth.y=null;S.booths.push(booth);
  }
  const savedId=booth.id;
  editId=null;// reset before closing
  save();renderAll();
  closeModal('mov-booth');
  toast(isNew?'已新增：'+author:'已儲存');
  if(andPin&&isNew)setTimeout(()=>startPin(savedId),350);
}
function deleteBooth(){
  if(!editId)return;
  const b=S.booths.find(x=>x.id===editId);
  showConfirm('刪除此攤位？',b?'「'+b.author+'」的資料將永久刪除':'',()=>{
    S.booths=S.booths.filter(x=>x.id!==editId);
    editId=null;save();renderAll();closeModal('mov-booth');toast('已刪除攤位');
  });
}

// ═══════════════════
// SETTINGS
// ═══════════════════
function openSettings(){
  document.getElementById('s-name').value=S.event.name;
  document.getElementById('s-date').value=S.event.date;
  renderFriendList();
  document.getElementById('mov-settings').classList.add('open');
}
function renderFriendList(){
  const el=document.getElementById('friend-list');el.innerHTML='';
  S.friends.forEach((f,i)=>{
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:5px;background:var(--surface2);border-radius:8px;padding:6px 8px';
    const nm=document.createElement('span');nm.style.cssText='font-size:12px;flex:1;color:var(--accent)';nm.textContent=f;
    const dl=document.createElement('button');dl.style.cssText='background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px';dl.textContent='✕';dl.onclick=()=>{S.friends.splice(i,1);renderFriendList();save();};
    row.appendChild(nm);row.appendChild(dl);el.appendChild(row);
  });
}
function addFriend(){
  const name=document.getElementById('new-friend').value.trim();
  if(!name||S.friends.includes(name))return;
  S.friends.push(name);document.getElementById('new-friend').value='';
  renderFriendList();save();
}
function saveSettings(){
  S.event.name=document.getElementById('s-name').value.trim()||S.event.name;
  S.event.date=document.getElementById('s-date').value;
  document.getElementById('ev-title').textContent=S.event.name;
  document.getElementById('ev-date').textContent=S.event.date.replace(/-/g,'.').slice(2);
  save();closeModal('mov-settings');toast('設定已儲存');
}
function handleCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const lines=ev.target.result.split('\n').filter(l=>l.trim());let added=0;
    lines.forEach((line,i)=>{
      if(i===0&&(line.includes('攤位')||line.includes('author')))return;
      const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      if(cols.length<2)return;
      S.booths.push({id:S.nextId++,num:cols[0]||'',author:cols[1]||'',twitter:cols[2]||'',note:cols[5]||'',
        priority:'mid',done:false,x:null,y:null,
        items:[{name:cols[3]||'',price:parseInt(cols[4])||0,proxy:[{name:SELF,qty:1}]}]});
      added++;
    });
    save();renderAll();closeModal('mov-settings');toast('匯入完成！新增 '+added+' 個攤位');
  };reader.readAsText(file,'UTF-8');
}

// ═══════════════════
// RENDER ALL
// ═══════════════════
// dirty flags - mark pages that need re-render when next visited
let _dirtyList=true,_dirtyProxy=true,_dirtyMap=true;

function renderAll(){
  // always update stats bar (lightweight)
  _updateStats();
  // render current active tab immediately, mark others dirty
  const active=document.querySelector('.page.active');
  if(active){
    if(active.id==='pg-map'){renderDots();_dirtyList=true;_dirtyProxy=true;}
    else if(active.id==='pg-list'){renderList();_dirtyMap=true;_dirtyProxy=true;}
    else if(active.id==='pg-proxy'){renderProxy();_dirtyMap=true;_dirtyList=true;}
  }
}

function _updateStats(){
  const total=S.booths.filter(b=>!b.done).length;
  const done=S.booths.filter(b=>b.done).length;
  const budget=S.booths.reduce((s,b)=>s+boothTotal(b),0);
  const stTotal=document.getElementById('st-total');
  const stDone=document.getElementById('st-done');
  const stBudget=document.getElementById('st-budget');
  if(stTotal)stTotal.textContent=total;
  if(stDone)stDone.textContent=done;
  if(stBudget)stBudget.textContent='¥'+budget.toLocaleString();
}

drawDemoMap();defaultZoom();

document.getElementById('ev-title').textContent=S.event.name;
document.getElementById('ev-date').textContent=S.event.date.replace(/-/g,'.').slice(2);
renderAll();
